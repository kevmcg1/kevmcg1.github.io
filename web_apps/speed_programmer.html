<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAAS SPEED CODER</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262e;
    --accent: #e06c75;
    --accent-dim: #e06c7518;
    --text: #cdd9e5;
    --text-dim: #545d6a;
    --font-mono: 'Roboto', 'Segoe UI', system-ui, sans-serif;
    --font-ui:   'Roboto', 'Segoe UI', system-ui, sans-serif;
    --syn-gcode:   #56b6c2;
    --syn-mcode:   #e5c07b;
    --syn-axis:    #e06c75;
    --syn-num:     #d19a66;
    --syn-feed:    #c678dd;
    --syn-tool:    #98c379;
    --syn-comment: #6a9955;
    --syn-oword:   #7ec8e3;
    --syn-percent: #858fa8;
    --syn-nl:      #e8eaf0;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    flex-shrink: 0; user-select: none;
    display: flex; flex-direction: column;
    padding: 6px 14px;
    gap: 6px;
  }
  .top-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .logo { font-size: 12px; font-weight: 700; letter-spacing: 2.5px; color: var(--accent); text-transform: uppercase; font-style: italic; }
  .sep { width: 1px; height: 16px; background: var(--border); margin: 0 2px; }
  #units-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-dim); letter-spacing: 1px; transition: all 0.3s; text-transform: uppercase; font-style: italic; }
  #units-badge.inch { border-color: #e5c07b; color: #e5c07b; }
  #units-badge.metric { border-color: #56b6c2; color: #56b6c2; }
  #status-pill { margin-left: auto; font-size: 11px; padding: 2px 10px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
  #status-pill.show { opacity: 1; }
  button {
    background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent);
    font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font-family: var(--font-ui); text-transform: uppercase; font-style: italic;
    transition: 0.2s;
  }
  button:hover { background: var(--accent); color: var(--bg); }
  .auto-btn-active {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
  }
  .hint-row {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    letter-spacing: 0.3px;
    border-top: 1px solid var(--border);
    padding-top: 5px;
    margin-top: 2px;
  }
  #editor-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
  #line-numbers { width: 52px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 12px 10px 12px 0; font-family: var(--font-mono); font-size: 13px; line-height: 22px; color: var(--text-dim); text-align: right; overflow: hidden; user-select: none; font-style: italic; }
  #editor-inner { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
  #highlight { position: absolute; inset: 0; font-family: var(--font-mono); font-size: 13px; line-height: 22px; padding: 12px 16px; white-space: pre; overflow: hidden; pointer-events: none; font-style: italic; text-transform: uppercase; color: transparent; }
  #editor { position: absolute; inset: 0; background: transparent; color: transparent; caret-color: #ffffff99; font-family: var(--font-mono); font-size: 13px; line-height: 22px; padding: 12px 16px; border: none; outline: none; resize: none; overflow-y: scroll; overflow-x: auto; white-space: pre; tab-size: 4; font-style: italic; text-transform: uppercase; -webkit-text-fill-color: transparent; }
  #editor::selection { background: #56b6c240; -webkit-text-fill-color: transparent; }
  #editor::-webkit-scrollbar { width: 8px; height: 8px; }
  #editor::-webkit-scrollbar-track { background: var(--bg); }
  #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .t-g { color: var(--syn-gcode); }
  .t-m { color: var(--syn-mcode); }
  .t-ax { color: var(--syn-axis); }
  .t-n { color: var(--syn-num); }
  .t-f { color: var(--syn-feed); }
  .t-tl { color: var(--syn-tool); }
  .t-cm { color: var(--syn-comment); }
  .t-ow { color: var(--syn-oword); }
  .t-pc { color: var(--syn-percent); }
  .t-nl { color: var(--syn-nl); }
  #autocomplete {
    position: absolute; background: var(--surface); border: 1px solid var(--accent);
    border-radius: 6px; box-shadow: 0 8px 28px rgba(0,0,0,0.7);
    min-width: 340px; max-width: 500px; max-height: 240px; overflow-y: auto;
    z-index: 100; display: none; font-family: var(--font-mono); font-size: 12px;
  }
  .ac-section { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-style: italic; color: var(--text-dim); padding: 5px 12px 2px; border-top: 1px solid var(--border); font-family: var(--font-ui); opacity: 0.7; }
  .ac-section:first-child { border-top: none; }
  .ac-item { display: flex; align-items: baseline; gap: 10px; padding: 5px 12px; cursor: pointer; border-bottom: 1px solid #ffffff05; }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.selected { background: var(--accent-dim); }
  .ac-code { color: var(--syn-gcode); font-weight: 700; min-width: 90px; font-style: italic; text-transform: uppercase; }
  .ac-item:hover .ac-code, .ac-item.selected .ac-code { color: var(--accent); }
  .ac-desc { color: var(--text-dim); font-size: 11px; font-family: var(--font-ui); }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); color: var(--accent); font-size: 12px; font-family: var(--font-mono); padding: 7px 16px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity 0.2s; white-space: nowrap; z-index: 200; font-style: italic; text-transform: uppercase; }
  #toast.show { opacity: 1; }

  #cheat-sheet-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
  }
  #cheat-sheet-modal.visible { visibility: visible; opacity: 1; }
  .cheat-sheet-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: 85%; max-width: 1000px; height: 80%; display: flex; flex-direction: column;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  }
  .cheat-sheet-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 2px;
  }
  .cheat-sheet-header button {
    background: none; border: none; color: var(--accent); font-size: 24px;
    cursor: pointer; line-height: 1; padding: 0 8px;
  }
  .cheat-sheet-content {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .cheat-category {
    grid-column: 1 / -1; font-size: 14px; font-weight: bold; margin-top: 12px;
    padding: 6px 12px; background: var(--accent-dim); border-radius: 4px;
    color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
  }
  .cheat-item {
    background: var(--bg); border-radius: 6px; padding: 8px 12px;
    border-left: 3px solid var(--accent); display: flex;
    justify-content: space-between; align-items: baseline; gap: 12px;
    font-family: var(--font-mono); font-size: 12px;
  }
  .cheat-item.quick-setup { border-left-color: #e5c07b; background: #1e232c; }
  .cheat-code { color: var(--syn-gcode); font-weight: 600; min-width: 140px; }
  .cheat-desc { color: var(--text-dim); text-align: right; font-style: italic; }

  /* Debug modal */
  #debug-modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
  }
  #debug-modal.visible { visibility: visible; opacity: 1; }
  .debug-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: 90%; max-width: 860px; height: 85%; display: flex; flex-direction: column;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  }
  .debug-header {
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .debug-header-left { display: flex; align-items: center; gap: 14px; }
  .debug-title { font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
  .debug-summary { font-size: 11px; color: var(--text-dim); font-style: italic; }
  .debug-summary .pass { color: #98c379; }
  .debug-summary .fail { color: var(--accent); }
  .debug-header button { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 0 6px; }
  .debug-body { flex: 1; overflow-y: auto; padding: 10px 16px; }
  .debug-category {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-style: italic;
    color: var(--accent); padding: 14px 0 4px; border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  .debug-row {
    display: grid; grid-template-columns: 42px 1fr 1fr; gap: 0;
    align-items: center; padding: 4px 6px; border-radius: 4px;
    font-family: var(--font-mono); font-size: 12px; border-bottom: 1px solid #ffffff04;
  }
  .debug-row:hover { background: #ffffff05; }
  .debug-check { font-size: 11px; font-weight: 600; }
  .debug-row.ok .debug-check  { color: #98c379; }
  .debug-row.fail .debug-check { color: var(--accent); }
  .debug-row.info .debug-check { color: var(--text-dim); }
  .debug-row.info .debug-output { color: var(--text-dim); font-style: italic; }
  .debug-input { color: var(--text); font-style: italic; text-transform: uppercase; padding-right: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .debug-output { color: var(--text-dim); font-style: italic; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .debug-row.ok .debug-output { color: var(--syn-gcode); }
  .debug-row.fail .debug-output { color: var(--accent); font-style: italic; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="top-row">
      <span class="logo">HAAS SPEED CODER</span>
      <div class="sep"></div>
      <span id="units-badge">UNITS ?</span>
      <div class="sep"></div>
      <button id="cheat-sheet-btn">Cheat Sheet</button>
      <button id="auto-semicolon-btn">Auto ; OFF</button>
      <button id="add-semicolons-btn">Add ;</button>
      <button id="remove-semicolons-btn">Remove ;</button>
      <button id="debug-btn">Debug</button>
      <span id="status-pill">Converted</span>
    </div>
    <div class="hint-row">
      Type anything and press Enter to convert to G-code
    </div>
  </div>
  <div id="editor-wrap">
    <div id="line-numbers"></div>
    <div id="editor-inner">
      <div id="highlight" aria-hidden="true"></div>
      <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      <div id="autocomplete"></div>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="cheat-sheet-modal">
  <div class="cheat-sheet-panel">
    <div class="cheat-sheet-header">
      <span>Conversion Cheat Sheet</span>
      <button id="close-cheat-sheet">X</button>
    </div>
    <div class="cheat-sheet-content" id="cheat-sheet-content"></div>
  </div>
</div>

<div id="debug-modal">
  <div class="debug-panel">
    <div class="debug-header">
      <div class="debug-header-left">
        <span class="debug-title">Conversion Debug</span>
        <span class="debug-summary" id="debug-summary"></span>
      </div>
      <button id="close-debug">X</button>
    </div>
    <div class="debug-body" id="debug-body"></div>
  </div>
</div>

<script src="haas-rules.js"></script>
<script>
  // ============================================================
  // UI CODE  (converter logic lives in haas-rules.js)
  // ============================================================
  const editor = document.getElementById('editor');
  const highlight = document.getElementById('highlight');
  const lineNums = document.getElementById('line-numbers');
  const acDropdown = document.getElementById('autocomplete');
  const statusPill = document.getElementById('status-pill');
  let acItems = [], acIndex = -1, acVisible = false;
  let currentUnits = null;
  let autoSemicolon = false;
  const autoSemicolonBtn = document.getElementById('auto-semicolon-btn');
  const addSemicolonsBtn = document.getElementById('add-semicolons-btn');
  const removeSemicolonsBtn = document.getElementById('remove-semicolons-btn');

  function shouldAddSemicolon(line) {
    const trimmed = line.trimRight();
    if (trimmed === '') return false;
    if (trimmed.startsWith('(')) return false;
    if (trimmed.startsWith('O') && /^O\d+/.test(trimmed)) return false;
    if (trimmed.startsWith('%')) return false;
    if (trimmed.endsWith(';')) return false;
    return true;
  }

  function addSemicolonToLine(line) {
    if (shouldAddSemicolon(line)) {
      return line.replace(/\s*$/, ';');
    }
    return line;
  }

  function isHaasCodeLine(line) {
    const trimmed = line.trim();
    if (trimmed === '') return false;
    if (trimmed.startsWith('(')) return false;
    if (trimmed.startsWith('O') && /^O\d+/.test(trimmed)) return false;
    if (trimmed.startsWith('%')) return false;
    if (HaasConverter.tryConvertLine(trimmed, {}) !== null) return false;
    if (/\bG\d+|\bM\d+|\b[XYZUVW]\s*-?\d/.test(trimmed)) return true;
    if (/\bT\d+|\bS\d+|\bF\d+/.test(trimmed)) return true;
    return false;
  }

  function addSemicolonsToHaasLinesOnly() {
    const lines = editor.value.split('\n');
    let modified = false;
    const newLines = lines.map(line => {
      if (isHaasCodeLine(line)) {
        const newLine = addSemicolonToLine(line);
        if (newLine !== line) modified = true;
        return newLine;
      }
      return line;
    });
    if (modified) {
      editor.value = newLines.join('\n');
      updateLineNumbers();
      showStatus('Added missing semicolons to G-code lines');
    } else {
      showStatus('No G-code lines need semicolons');
    }
  }

  function removeAllSemicolons() {
    const lines = editor.value.split('\n');
    let modified = false;
    const newLines = lines.map(line => {
      const trimmed = line.trimRight();
      if (trimmed.endsWith(';')) {
        modified = true;
        return trimmed.slice(0, -1).trimRight();
      }
      return line;
    });
    if (modified) {
      editor.value = newLines.join('\n');
      updateLineNumbers();
      showStatus('Removed trailing semicolons from all lines');
    } else {
      showStatus('No trailing semicolons found');
    }
  }

  function toggleAutoSemicolon() {
    autoSemicolon = !autoSemicolon;
    if (autoSemicolon) {
      autoSemicolonBtn.textContent = 'Auto ; ON';
      autoSemicolonBtn.classList.add('auto-btn-active');
      showStatus('Auto semicolon ON');
    } else {
      autoSemicolonBtn.textContent = 'Auto ; OFF';
      autoSemicolonBtn.classList.remove('auto-btn-active');
      showStatus('Auto semicolon OFF');
    }
  }

  autoSemicolonBtn.addEventListener('click', toggleAutoSemicolon);
  addSemicolonsBtn.addEventListener('click', addSemicolonsToHaasLinesOnly);
  removeSemicolonsBtn.addEventListener('click', removeAllSemicolons);

  function updateUnitsBadge() {
    currentUnits = HaasConverter.detectUnits(editor.value);
    const b = document.getElementById('units-badge');
    if (currentUnits === 'inch') { b.textContent = 'INCH (G20)'; b.className = 'inch'; }
    else if (currentUnits === 'metric') { b.textContent = 'METRIC (G21)'; b.className = 'metric'; }
    else { b.textContent = 'UNITS ?'; b.className = ''; }
  }

  function fmtNum(numStr) { return HaasConverter.fmtNum(numStr); }
  function applyUnitFormat(str) {
    if (!currentUnits) return str;
    return HaasConverter.applyUnitFormat(str, currentUnits);
  }
  function parseCoords(str) { return HaasConverter.parseCoords(str); }
  function tryConvertLine(rawLine, context) { return HaasConverter.tryConvertLine(rawLine, context); }
  function getAutocompleteSuggestions(prefix) { return HaasConverter.getAutocompleteSuggestions(prefix); }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function highlightRest(line) {
    const TOKEN = /(\([^)]*\))|(\bG\d+\.?\d*)|(\bM\d+)|([FS]-?[\d.]+)|([THD]\d+)|([XYZABCUVWIJKRQP])(-?[\d.]+)|(-?[\d.]+)|(\s+)|(.)/gi;
    let out = '';
    let m;
    while ((m = TOKEN.exec(line)) !== null) {
      if (m[1]) out += `<span class="t-cm">${esc(m[1])}</span>`;
      else if (m[2]) out += `<span class="t-g">${esc(m[2])}</span>`;
      else if (m[3]) out += `<span class="t-m">${esc(m[3])}</span>`;
      else if (m[4]) out += `<span class="t-f">${esc(m[4])}</span>`;
      else if (m[5]) out += `<span class="t-tl">${esc(m[5])}</span>`;
      else if (m[6]) out += `<span class="t-ax">${esc(m[6])}</span><span class="t-n">${esc(m[7])}</span>`;
      else if (m[8]) out += `<span class="t-n">${esc(m[8])}</span>`;
      else if (m[9]) out += esc(m[9]);
      else out += `<span class="t-nl">${esc(m[0])}</span>`;
    }
    return out;
  }

  function highlightLine(raw) {
    const line = raw.toUpperCase();
    if (/^\s*%\s*$/.test(line)) return `<span class="t-pc">${esc(line)}</span>`;
    if (/^\s*O\d/.test(line)) {
      return line.replace(/^(\s*)(O\d+)(.*)$/, (_, sp, onum, rest) => {
        return esc(sp) + `<span class="t-ow">${esc(onum)}</span>` + highlightRest(rest);
      });
    }
    if (/^\s*\(/.test(line)) return `<span class="t-cm">${esc(line)}</span>`;
    const hasGM = /\bG\d+|\bM\d+/i.test(line);
    if (!hasGM) {
      const hasLongAlpha = /(?<![A-Z])[A-Z]{2,}/i.test(line.replace(/\([^)]*\)/g,''));
      if (hasLongAlpha) return `<span class="t-nl">${esc(line)}</span>`;
    }
    return highlightRest(line);
  }

  function highlightCode(text) {
    return text.split('\n').map(highlightLine).join('\n');
  }

  function syncHighlight() {
    highlight.innerHTML = highlightCode(editor.value);
    highlight.scrollTop = editor.scrollTop;
    highlight.scrollLeft = editor.scrollLeft;
  }

  function updateLineNumbers() {
    const lines = editor.value.split('\n');
    lineNums.innerHTML = lines.map((_,i) => `<div style="line-height:22px">${i+1}</div>`).join('');
    lineNums.scrollTop = editor.scrollTop;
    updateUnitsBadge();
    syncHighlight();
  }
  editor.addEventListener('scroll', () => {
    lineNums.scrollTop = editor.scrollTop;
    highlight.scrollTop = editor.scrollTop;
    highlight.scrollLeft = editor.scrollLeft;
  });

  let statusTimer;
  function showStatus(msg) {
    statusPill.textContent = msg;
    statusPill.classList.add('show');
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => statusPill.classList.remove('show'), 2200);
  }

  function showAutocomplete(suggestions, x, y) {
    acItems = suggestions; acIndex = -1;
    let html = '', lastType = null;
    suggestions.forEach((s, i) => {
      const typeLabel = HaasConverter.TYPE_LABEL[s.type] || s.type;
      if (s.type !== lastType) {
        html += `<div class="ac-section">${typeLabel}</div>`;
        lastType = s.type;
      }
      html += `<div class="ac-item" data-i="${i}">
        <span class="ac-code">${s.code}</span>
        <span class="ac-desc">${s.desc}</span>
      </div>`;
    });
    acDropdown.innerHTML = html;
    acDropdown.style.left = x + 'px';
    acDropdown.style.top = y + 'px';
    acDropdown.style.display = 'block';
    acVisible = true;
    acDropdown.querySelectorAll('.ac-item').forEach(el => {
      el.addEventListener('mousedown', e => { e.preventDefault(); applyAutocomplete(parseInt(el.dataset.i)); });
    });
  }

  function hideAutocomplete() { acDropdown.style.display='none'; acVisible=false; acIndex=-1; }
  function acHighlight() {
    acDropdown.querySelectorAll('.ac-item').forEach((el,i) => {
      el.classList.toggle('selected', i===acIndex);
      if (i===acIndex) el.scrollIntoView({block:'nearest'});
    });
  }
  function applyAutocomplete(i) {
    const item = acItems[i]; if (!item) return;
    const pos = editor.selectionStart, val = editor.value;
    const lineStart = val.lastIndexOf('\n', pos-1)+1;
    const lineEnd = val.indexOf('\n', pos);
    const end = lineEnd===-1 ? val.length : lineEnd;
    editor.value = val.slice(0, lineStart) + item.code + val.slice(end);
    const newPos = lineStart + item.code.length;
    editor.setSelectionRange(newPos, newPos);
    hideAutocomplete(); updateLineNumbers();
  }
  function getCaretCoords() {
    const mirror = document.createElement('div');
    const style = window.getComputedStyle(editor);
    mirror.style.cssText = `position:absolute;visibility:hidden;white-space:pre-wrap;word-wrap:break-word;
      font:${style.font};line-height:${style.lineHeight};padding:${style.padding};
      border:${style.border};width:${editor.offsetWidth}px;`;
    document.body.appendChild(mirror);
    mirror.innerHTML = editor.value.slice(0,editor.selectionStart).replace(/</g,'&lt;') + '<span id="_c">|</span>';
    const r = mirror.querySelector('#_c').getBoundingClientRect();
    const w = document.getElementById('editor-inner').getBoundingClientRect();
    document.body.removeChild(mirror);
    return { x: r.left - w.left, y: r.bottom - w.top + 4 };
  }

  function getTrailingNaturalLanguage(line) {
    const tokenRegex = /(\([^)]*\))|(\bG\d+\.?\d*)|(\bM\d+)|([FS]-?[\d.]+)|([THD]\d+)|([XYZABCUVWIJKRQP])(-?[\d.]+)|(-?[\d.]+)|(\s+)|(.)/gi;
    let lastGcodeEnd = 0;
    let match;
    while ((match = tokenRegex.exec(line)) !== null) {
      if (match[2] || match[3] || match[4] || match[5] || match[6] || match[8]) {
        lastGcodeEnd = match.index + match[0].length;
      }
    }
    const trailing = line.slice(lastGcodeEnd);
    return { startIdx: lastGcodeEnd, trailing };
  }

  function applySemicolonsToConvertedString(str) {
    if (!autoSemicolon) return str;
    const lines = str.split('\n');
    const processed = lines.map(line => addSemicolonToLine(line));
    return processed.join('\n');
  }

  editor.addEventListener('keydown', e => {
    if (acVisible) {
      if (e.key==='ArrowDown')  { e.preventDefault(); acIndex=Math.min(acIndex+1,acItems.length-1); acHighlight(); return; }
      if (e.key==='ArrowUp')    { e.preventDefault(); acIndex=Math.max(acIndex-1,0); acHighlight(); return; }
      if ((e.key==='Enter'||e.key==='Tab') && acIndex>=0) { e.preventDefault(); applyAutocomplete(acIndex); return; }
      if (e.key==='Escape')     { e.preventDefault(); hideAutocomplete(); return; }
    }

    if (e.key==='Tab' && !acVisible) {
      e.preventDefault();
      const pos=editor.selectionStart, val=editor.value;
      const lineStart=val.lastIndexOf('\n',pos-1)+1;
      const sug=getAutocompleteSuggestions(val.slice(lineStart,pos).trim());
      if (sug.length>0) { const c=getCaretCoords(); showAutocomplete(sug,c.x,c.y); }
      return;
    }

    if (e.key==='Enter') {
      e.preventDefault();
      const pos=editor.selectionStart, val=editor.value;
      const lineStart=val.lastIndexOf('\n',pos-1)+1;
      const lineEnd=val.indexOf('\n',pos);
      const end=lineEnd===-1?val.length:lineEnd;
      const currentLine=val.slice(lineStart,end);
      hideAutocomplete();

      currentUnits = HaasConverter.detectUnits(val.slice(0, lineStart));
      const lastMotionModal = HaasConverter.getLastMotionModal(val.slice(0, lineStart));
      const context = { lastMotionModal };

      const cursorOffset = pos - lineStart;
      const isMidLine = cursorOffset > 0 && cursorOffset < currentLine.length;
      const isPureGcode = HaasConverter.tryConvertLine(currentLine, context) === null
                          && /\bG\d+|\bM\d+|\b[XYZUVW]\s*-?\d|\bT\d+|\bS\d+|\bF\d+/i.test(currentLine)
                          && !/[a-z]{3,}/i.test(currentLine.replace(/\([^)]*\)/g, ''));

      if (isPureGcode && isMidLine) {
        editor.value = val.slice(0, pos) + '\n' + val.slice(pos);
        editor.setSelectionRange(pos+1, pos+1);
        updateLineNumbers();
        return;
      }

      const hasNL = /[a-z]{3,}/i.test(currentLine);
      const hasGM = /\bG\d+|\bM\d+/i.test(currentLine);
      let newLine = currentLine;

      if (hasGM && hasNL) {
        const { startIdx, trailing } = getTrailingNaturalLanguage(currentLine);
        const trimmedTrailing = trailing.trim();
        if (trimmedTrailing) {
          const convertedTrailing = tryConvertLine(trimmedTrailing, context);
          if (convertedTrailing) {
            newLine = currentLine.slice(0, startIdx) + convertedTrailing;
          }
        }
      }

      if (newLine === currentLine) {
        const converted = tryConvertLine(currentLine, context);
        if (converted) {
          newLine = converted;
        }
      }

      newLine = applySemicolonsToConvertedString(newLine);

      editor.value = val.slice(0, lineStart) + newLine + val.slice(end);
      const newPos = lineStart + newLine.length;
      const v2 = editor.value;
      editor.value = v2.slice(0, newPos) + '\n' + v2.slice(newPos);
      editor.setSelectionRange(newPos+1, newPos+1);
      if (newLine !== currentLine) showStatus('Converted');
      updateLineNumbers();
      return;
    }
  });

  // Build debug cases dynamically from every cheat sheet item so the
  // debug panel is always 100% in sync with the cheat sheet.
  function buildDebugCases() {
    const cases = [];
    const items = HaasConverter.getCheatSheetItems();
    for (const item of items) {
      // Substitute placeholder tokens with safe example values
      let input = item.code
        .replace(/T##/g, 'T3')
        .replace(/H##/g, 'H03')
        .replace(/D##/g, 'D10')
        .replace(/O####/g, 'O1234')
        .replace(/####/g, '5000')
        .replace(/###/g, '800')
        .replace(/##/g, '03')
        .replace(/#\.#/g, '2.0')
        .replace(/\d+–\d+/g, '1')
        .replace(/#/g, '1')
        .trim();

      const isGM = (item.category === 'G-Code' || item.category === 'M-Code');
      // G/M code entries: raw gcode passes through unchanged (tryConvertLine → null),
      // shown as INFO rows. NL/Shortcut entries: any non-null result = pass.
      cases.push({
        category: item.category,
        input,
        desc: item.desc,
        raw: item.code,
        expect: isGM ? undefined : null   // undefined = info-only, null = any-result pass
      });
    }
    return cases;
  }

  function runDebug() {
    const ctx = {};
    let pass = 0, fail = 0, info = 0;
    const byCategory = {};

    const DEBUG_CASES = buildDebugCases();

    for (const tc of DEBUG_CASES) {
      const result = HaasConverter.tryConvertLine(tc.input, ctx);
      let ok, isInfo;
      if (tc.expect === undefined) {
        // G-Code / M-Code info rows — no pass/fail, just show output
        isInfo = true; ok = true; info++;
      } else {
        // NL / Shortcut rows — any non-null result counts as pass
        isInfo = false;
        ok = result !== null;
        if (ok) pass++; else fail++;
      }
      if (!byCategory[tc.category]) byCategory[tc.category] = [];
      byCategory[tc.category].push({ ...tc, result, ok, isInfo });
    }

    debugSummary.innerHTML =
      `<span class="pass">OK ${pass} passed</span>&nbsp;&nbsp;<span class="fail">${fail > 0 ? 'FAIL ' + fail + ' failed' : ''}</span>&nbsp;&nbsp;<span style="color:var(--text-dim)">${info} info</span>`;

    let html = '';
    for (const [cat, rows] of Object.entries(byCategory)) {
      html += `<div class="debug-category">${cat}</div>`;
      for (const r of rows) {
        const outText = r.result !== null && r.result !== undefined
          ? r.result.replace(/\n/g, ' ↵ ')
          : r.isInfo ? '— raw g-code —' : '— no conversion —';
        const rowClass = r.isInfo ? 'info' : r.ok ? 'ok' : 'fail';
        const checkLabel = r.isInfo ? 'INFO' : r.ok ? 'OK' : 'FAIL';
        const inputDisplay = r.raw || r.input;
        html += `<div class="debug-row ${rowClass}">
          <span class="debug-check">${checkLabel}</span>
          <span class="debug-input" title="${inputDisplay}">${inputDisplay}</span>
          <span class="debug-output" title="${outText}">${outText}</span>
        </div>`;
      }
    }
    debugBody.innerHTML = html;
  }
