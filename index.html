<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KGM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top:    #0d0d0f;
      --bg-bottom: #080810;
      --surface:   #111114;
      --border:    #1e1e24;
      --text:      #e8e8e8;
      --muted:     #52525e;
      --accent:    #c8ff00;
      --card-hover:#17171c;
      --tag-bg:    #1a1a22;
      --radius:    10px;
    }

    /* ─────────────── BASE ─────────────── */
    html { scroll-behavior: smooth; }

    body {
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem);
      gap: clamp(1.8rem, 4vw, 2.8rem);
    }

    /* ─────────────── HEADER ─────────────── */
    header {
      text-align: center;
      animation: fadeUp 0.7s ease both;
      width: 100%;
    }

    .title-wrap {
      position: relative;
      display: inline-block;
      padding: 0.6rem 1.2rem;
    }

    /* Corner brackets */
    .title-wrap::before,
    .title-wrap::after {
      content: '';
      position: absolute;
      width: clamp(12px, 3vw, 22px);
      height: clamp(12px, 3vw, 22px);
      border-color: var(--muted);
      border-style: solid;
      opacity: 0.6;
    }

    /* top-left */
    .title-wrap::before {
      top: -6px; left: -10px;
      border-width: 1.5px 0 0 1.5px;
    }

    /* bottom-right */
    .title-wrap::after {
      bottom: -6px; right: -10px;
      border-width: 0 1.5px 1.5px 0;
    }

    /* top-right and bottom-left via inner spans */
    .corner-tr,
    .corner-bl {
      position: absolute;
      width: clamp(12px, 3vw, 22px);
      height: clamp(12px, 3vw, 22px);
      border-color: var(--muted);
      border-style: solid;
      opacity: 0.6;
      pointer-events: none;
    }

    .corner-tr { top: -6px; right: -10px; border-width: 1.5px 1.5px 0 0; }
    .corner-bl { bottom: -6px; left: -10px; border-width: 0 0 1.5px 1.5px; }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.86;
      letter-spacing: 0.04em;
      color: var(--text);
      font-style: italic;
    }

    .title .line-full { display: block; }
    .title .line-name {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.2px var(--text);
    }

    /* ─────────────── NAV ICONS ─────────────── */
    .nav-icons {
      display: flex;
      gap: clamp(1.2rem, 5vw, 2.2rem);
      justify-content: center;
      margin-top: clamp(0.9rem, 2.5vw, 1.4rem);
      flex-wrap: wrap;
    }

    .nav-icons a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.38rem;
      color: var(--muted);
      text-decoration: none;
      font-size: clamp(0.55rem, 1.8vw, 0.62rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 0.4rem 0.2rem;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-icons a:hover,
    .nav-icons a:focus-visible { color: var(--accent); outline: none; }

    .nav-icons svg {
      width: clamp(17px, 3.5vw, 20px);
      height: clamp(17px, 3.5vw, 20px);
      fill: currentColor;
      transition: filter 0.2s;
    }

    .nav-icons a:hover svg,
    .nav-icons a:focus-visible svg {
      filter: drop-shadow(0 0 5px rgba(200,255,0,0.5));
    }

    /* ─────────────── CONTACT BUTTON ─────────────── */
    .contact-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.38rem;
      color: var(--muted);
      text-decoration: none;
      font-size: clamp(0.55rem, 1.8vw, 0.62rem);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
      padding: 0.4rem 0.2rem;
      -webkit-tap-highlight-color: transparent;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      position: relative;
    }

    .contact-btn:hover,
    .contact-btn:focus-visible { color: var(--accent); outline: none; }

    .contact-btn svg {
      width: clamp(17px, 3.5vw, 20px);
      height: clamp(17px, 3.5vw, 20px);
      fill: currentColor;
      transition: filter 0.2s;
    }

    .contact-btn:hover svg,
    .contact-btn:focus-visible svg {
      filter: drop-shadow(0 0 5px rgba(200,255,0,0.5));
    }

    /* ─────────────── EMAIL REVEAL ─────────────── */
    .email-reveal {
      opacity: 0;
      pointer-events: none;
      font-size: clamp(0.72rem, 2vw, 0.82rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-transform: none;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 1.2s ease;
      white-space: nowrap;
      /* subtle glow */
      text-shadow: 0 0 12px rgba(200,255,0,0.35);
    }

    .email-reveal.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ─────────────── FOOTER ─────────────── */
    footer {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(0.7rem, 2.2vw, 0.85rem);
      letter-spacing: 0.2em;
      color: var(--muted);
      opacity: 0.5;
      animation: fadeUp 0.7s 0.4s ease both;
      padding-top: 0.5rem;
    }

    /* ─────────────── ANIMATIONS ─────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─────────────── RESPONSIVE TWEAKS ─────────────── */

    /* Mobile landscape (≤ 600px) */
    @media (max-width: 600px) {
      body { justify-content: flex-start; padding-top: clamp(2rem, 8vw, 3.5rem); }
      .nav-icons { gap: 1.4rem; }
    }

    /* Tiny phones (≤ 360px) */
    @media (max-width: 360px) {
      .nav-icons { gap: 1rem; }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

</body>
</html>
