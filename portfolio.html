<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-top:    #0d0d0f;
      --bg-bottom: #080810;
      --surface:   #111114;
      --border:    #1e1e24;
      --text:      #e8e8e8;
      --muted:     #8a8a9a;
      --accent:    #c8ff00;
      --card-hover:#17171c;
      --tag-bg:    #1a1a22;
      --radius:    10px;

      /* category colors re-mapped to fit the about-page palette */
      --cat-web:   #c8ff00;
      --cat-shop:  #e8e8e8;
      --status-complete: #c8ff00;
      --status-active:   #e8e8e8;
      --status-wip:      #8a8a9a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    .page { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 32px 0;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sidebar-logo {
      padding: 0 24px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .logo-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.18em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 10px;
    }
    .sidebar-logo h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.04em; line-height: 0.9;
      color: var(--text);
    }
    .sidebar-logo h2 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.2px var(--text);
    }
    .sidebar-logo .title-underline {
      width: 100%;
      height: 1.5px;
      background: linear-gradient(90deg, var(--text) 0%, transparent 100%);
      margin-top: 0.7rem;
      opacity: 0.4;
    }

    .filter-section {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }
    .filter-title {
      font-size: 0.6rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .filter-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .chip-list { display: flex; flex-direction: column; gap: 6px; }

    .chip {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; text-align: left; width: 100%;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .chip:hover { border-color: var(--border); color: var(--text); background: var(--card-hover); }
    .chip.on {
      border-color: var(--chip-color, var(--accent));
      color: var(--chip-color, var(--accent));
      background: transparent;
    }
    .chip.on::after {
      content: ''; position: absolute; inset: 0;
      background: var(--chip-color, var(--accent)); opacity: 0.06;
      pointer-events: none;
    }

    .chip-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--chip-color, var(--muted)); opacity: 0.35; flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .chip.on .chip-dot { opacity: 1; }
    .chip-label { flex: 1; }
    .chip-count {
      font-size: 0.58rem; color: var(--muted);
      background: var(--tag-bg); padding: 1px 7px; border-radius: 20px;
      transition: all 0.2s;
    }
    .chip.on .chip-count { background: var(--chip-color, var(--accent)); color: #0d0d0f; }
    .chip-check { font-size: 0.7rem; opacity: 0; transition: opacity 0.2s; color: var(--chip-color, var(--accent)); }
    .chip.on .chip-check { opacity: 1; }

    .clear-btn {
      margin: 16px 24px 0;
      padding: 10px 14px;
      background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; width: calc(100% - 48px);
      transition: all 0.2s;
    }
    .clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── MAIN ── */
    .main { flex: 1; padding: 48px 40px 80px; min-width: 0; }

    .main-header {
      margin-bottom: 32px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.1s;
    }
    .main-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.04em; line-height: 0.86;
      color: var(--text);
    }
    .main-header h1 span {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--text);
    }
    .header-underline {
      width: 100%; max-width: 340px;
      height: 1.5px;
      background: linear-gradient(90deg, var(--text) 0%, transparent 100%);
      margin-top: 0.6rem;
      opacity: 0.4;
    }
    .header-meta {
      display: flex; align-items: center; gap: 16px; margin-top: 14px; flex-wrap: wrap;
    }
    .meta-item {
      font-size: 0.6rem; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase;
    }
    .meta-div { width: 1px; height: 12px; background: var(--border); }

    .tag-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 24px; margin-bottom: 14px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.2s;
    }
    .atag {
      font-size: 0.58rem; letter-spacing: 0.1em;
      padding: 3px 10px; border-radius: 4px; text-transform: uppercase;
      display: flex; align-items: center; gap: 5px;
      animation: pop 0.18s ease;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
    }
    @keyframes pop { from { transform: scale(0.75); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .atag-x { cursor: pointer; opacity: 0.55; transition: opacity 0.15s; font-size: 0.65rem; }
    .atag-x:hover { opacity: 1; }

    .result-count {
      font-size: 0.6rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.25s;
    }
    .result-count em { color: var(--accent); font-style: normal; }

    /* ── PROJECT CARDS ── */
    .cards-wrap {
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.3s;
    }

    .project-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      display: flex; align-items: stretch;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
      text-decoration: none;
      color: inherit;
      position: relative;
    }
    .project-card::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(200,255,0,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .project-card[href]:hover {
      background: var(--card-hover);
      border-color: #2a2a34;
      transform: translateY(-1px);
      cursor: pointer;
    }
    .project-card[href]:hover::after { opacity: 1; }
    .project-card:not([href]):hover { background: var(--card-hover); }
    .project-card.hide { display: none; }

    .card-accent-bar {
      width: 3px; flex-shrink: 0;
      background: var(--cat-color, var(--accent));
      opacity: 0.7;
    }

    .card-body {
      flex: 1; padding: 18px 22px;
      display: flex; align-items: center; gap: 20px; min-width: 0;
    }

    .card-left { flex: 1; min-width: 0; }

    .card-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text); line-height: 1.1;
      display: flex; align-items: center; gap: 8px;
    }
    .card-link-icon {
      font-size: 0.7rem; opacity: 0.3;
      transition: opacity 0.2s;
    }
    .project-card[href]:hover .card-link-icon { opacity: 0.9; color: var(--accent); }

    .card-id {
      font-size: 0.6rem; color: var(--muted); letter-spacing: 0.14em; margin-top: 3px;
      text-transform: uppercase;
    }
    .card-desc {
      font-size: 0.82rem; font-weight: 300; color: #c8c8d8;
      margin-top: 7px; line-height: 1.7;
    }

    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; }

    .card-updated {
      display: flex; align-items: center; gap: 5px;
      margin-top: 9px;
      font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .card-updated-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted); opacity: 0.4; flex-shrink: 0;
    }
    .tag-pill {
      font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 2px 8px; border-radius: 3px;
      border: 1px solid; opacity: 0.7;
      font-family: 'DM Sans', sans-serif; font-weight: 500;
    }

    .card-right {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 8px; flex-shrink: 0;
    }

    .cat-badge {
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 4px;
      border: 1px solid var(--cat-color, var(--accent));
      color: var(--cat-color, var(--accent));
      background: transparent; white-space: nowrap;
      position: relative; overflow: hidden;
    }
    .cat-badge::after {
      content: ''; position: absolute; inset: 0;
      background: var(--cat-color, var(--accent)); opacity: 0.07;
    }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--status-color, var(--muted));
      box-shadow: 0 0 6px var(--status-color, transparent);
    }

    .status-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }

    /* Stats bar */
    .stats {
      display: flex; gap: 0; margin-top: 24px;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--surface);
      opacity: 0; animation: fadeUp 0.7s ease forwards 0.5s;
    }
    .stat {
      flex: 1; padding: 18px 20px;
      border-right: 1px solid var(--border);
      text-align: center;
    }
    .stat:last-child { border-right: none; }
    .stat-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem; font-weight: 400;
      color: var(--accent); line-height: 1;
      letter-spacing: 0.04em;
    }
    .stat-l {
      font-size: 0.58rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--muted); margin-top: 4px;
    }

    /* Empty state */
    .empty {
      text-align: center; padding: 60px 20px;
      display: none;
    }
    .empty.show { display: block; }
    .empty-icon { font-size: 2.4rem; margin-bottom: 14px; opacity: 0.2; }
    .empty-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    }
    .empty-sub {
      font-size: 0.62rem; color: var(--muted); margin-top: 6px;
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE TOP BAR ── */
    .mobile-bar {
      display: none;
      position: sticky; top: 0; z-index: 100;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      align-items: center; justify-content: space-between;
    }
    .mobile-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem; font-weight: 400;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text); line-height: 1;
    }
    .mobile-logo span {
      color: transparent;
      -webkit-text-stroke: 1px var(--text);
    }
    .filter-toggle-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .filter-toggle-btn.has-filters { border-color: var(--accent); color: var(--accent); }
    .filter-toggle-btn .ftb-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); display: none;
    }
    .filter-toggle-btn.has-filters .ftb-dot { display: block; }

    /* ── MOBILE DRAWER ── */
    .drawer-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(2px);
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 0 0 env(safe-area-inset-bottom, 16px);
      max-height: 85vh; overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle { width: 36px; height: 3px; border-radius: 2px; background: var(--border); margin: 14px auto 0; }
    .drawer-header {
      padding: 14px 22px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .drawer-title {
      font-size: 0.6rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: var(--accent);
    }
    .drawer-close { background: transparent; border: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 0 4px; line-height: 1; }
    .drawer-body { padding: 16px 22px 22px; }
    .drawer-section { margin-bottom: 20px; }
    .drawer-section-title {
      font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .drawer-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .drawer-chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .drawer-chip {
      padding: 8px 14px; border-radius: var(--radius);
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .drawer-chip.on { border-color: var(--chip-color, var(--accent)); color: var(--chip-color, var(--accent)); }
    .drawer-chip.on::after { content: ''; position: absolute; inset: 0; background: var(--chip-color, var(--accent)); opacity: 0.08; pointer-events: none; }
    .drawer-clear {
      width: 100%; padding: 11px; margin-top: 8px;
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; font-weight: 500;
    }
    .drawer-clear:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 1024px) { .sidebar { width: 210px; } .main { padding: 30px 26px 60px; } }
    @media (max-width: 768px) {
      .sidebar { display: none; } .mobile-bar { display: flex; }
      .page { flex-direction: column; } .main { padding: 22px 18px 60px; }
      .main-header h1 { font-size: clamp(2rem, 9vw, 3.2rem); }
      .stats { flex-wrap: wrap; }
      .stat { min-width: calc(33.33% - 1px); border-bottom: 1px solid var(--border); }
      .card-body { flex-wrap: wrap; gap: 12px; }
      .card-right { flex-direction: row; align-items: center; width: 100%; justify-content: flex-start; }
    }
    @media (max-width: 480px) {
      .main { padding: 16px 14px 60px; } .card-body { padding: 14px 16px; }
      .card-name { font-size: 0.88rem; } .card-desc { font-size: 0.78rem; }
      .stats { flex-wrap: wrap; } .stat { min-width: 50%; }
      .header-meta { gap: 10px; } .meta-div { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- MOBILE TOP BAR -->
  <div class="mobile-bar" id="mobileBar">
    <div class="mobile-logo">Project <span>Registry</span></div>
    <button class="filter-toggle-btn" id="filterToggleBtn" onclick="openDrawer()">
      <span class="ftb-dot"></span>Filters
    </button>
  </div>

  <!-- FILTER DRAWER (mobile) -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="filterDrawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span class="drawer-title">— Filters</span>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-section">
        <div class="drawer-section-title">Category</div>
        <div class="drawer-chips">
          <button class="drawer-chip" data-g="cat" data-v="web_apps"  style="--chip-color:#c8ff00" onclick="toggleDrawer(this)">Web Apps</button>
          <button class="drawer-chip" data-g="cat" data-v="shop_work" style="--chip-color:#e8e8e8" onclick="toggleDrawer(this)">Shop Work</button>
        </div>
      </div>
      <div class="drawer-section">
        <div class="drawer-section-title">Status</div>
        <div class="drawer-chips">
          <button class="drawer-chip" data-g="status" data-v="complete" style="--chip-color:#c8ff00" onclick="toggleDrawer(this)">Complete</button>
          <button class="drawer-chip" data-g="status" data-v="active"   style="--chip-color:#e8e8e8" onclick="toggleDrawer(this)">Active</button>
          <button class="drawer-chip" data-g="status" data-v="wip"      style="--chip-color:#8a8a9a" onclick="toggleDrawer(this)">In Progress</button>
        </div>
      </div>
      <button class="drawer-clear" onclick="clearAll()">⟳ &nbsp;Clear All Filters</button>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-tag">— Portfolio</div>
      <h2>Project<br><span>Registry</span></h2>
      <div class="title-underline"></div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Category</div>
      <div class="chip-list">
        <button class="chip" data-g="cat" data-v="web_apps" style="--chip-color:#c8ff00" onclick="toggle(this)">
          <span class="chip-dot"></span><span class="chip-label">Web Apps</span>
          <span class="chip-check">✓</span>
        </button>
        <button class="chip" data-g="cat" data-v="shop_work" style="--chip-color:#e8e8e8" onclick="toggle(this)">
          <span class="chip-dot"></span><span class="chip-label">Shop Work</span>
          <span class="chip-check">✓</span>
        </button>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-title">Status</div>
      <div class="chip-list">
        <button class="chip" data-g="status" data-v="complete" style="--chip-color:#c8ff00" onclick="toggle(this)">
          <span class="chip-dot"></span><span class="chip-label">Complete</span>
          <span class="chip-check">✓</span>
        </button>
        <button class="chip" data-g="status" data-v="active" style="--chip-color:#e8e8e8" onclick="toggle(this)">
          <span class="chip-dot"></span><span class="chip-label">Active</span>
          <span class="chip-check">✓</span>
        </button>
        <button class="chip" data-g="status" data-v="wip" style="--chip-color:#8a8a9a" onclick="toggle(this)">
          <span class="chip-dot"></span><span class="chip-label">In Progress</span>
          <span class="chip-check">✓</span>
        </button>
      </div>
    </div>

    <button class="clear-btn" onclick="clearAll()">⟳ &nbsp;Clear All Filters</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <h1>All<br><span>Projects</span></h1>
      <div class="header-underline"></div>
      <div class="header-meta">
        <span class="meta-item">Personal Portfolio</span>
        <div class="meta-div"></div>
        <span class="meta-item" id="totalCount">0 Projects</span>
        <div class="meta-div"></div>
        <span class="meta-item" id="ds"></span>
      </div>
    </div>

    <div class="tag-bar" id="tagBar"></div>
    <div class="result-count" id="rc"><em id="vc">0</em> projects shown</div>

    <div class="cards-wrap" id="cardsWrap"></div>

    <div class="empty" id="empty">
      <div class="empty-icon">◈</div>
      <div class="empty-title">No Projects Found</div>
      <div class="empty-sub">Adjust filters to see results</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Showing</div></div>
      <div class="stat"><div class="stat-n" id="sWebApps">0</div><div class="stat-l">Web Apps</div></div>
      <div class="stat"><div class="stat-n" id="sShopWork">0</div><div class="stat-l">Shop Work</div></div>
    </div>
  </main>
</div>

<script>
  document.getElementById('ds').textContent =
    new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'2-digit'}).toUpperCase();

  const CAT_COLOR = {
    web_apps:  '#c8ff00',
    shop_work: '#e8e8e8',
  };
  const CAT_LABEL = {
    web_apps:  'Web App',
    shop_work: 'Shop Work',
  };
  const STATUS_COLOR = {
    complete: '#c8ff00',
    active:   '#e8e8e8',
    wip:      '#8a8a9a',
  };
  const STATUS_LABEL = {
    complete: 'Complete',
    active:   'Active',
    wip:      'In Progress',
  };

  // ── ADD YOUR PROJECTS HERE ──────────────────────────────────────────────────
  const DATA = [
    {
      id: 'PROJ-001',
      name: 'Insert Master',
      cat: 'web_apps',
      status: 'complete',
      url: '/web_apps/insert_master.html',
      desc: 'Insert Decoder & Builder — a tool for working with machining inserts.',
      tags: ['Web App', 'Tool'],
      updated: 'Mar 2026',
    },
    {
      id: 'PROJ-002',
      name: 'Speeds & Feeds',
      cat: 'web_apps',
      status: 'complete',
      url: '/web_apps/speedsnfeeds.html',
      desc: 'Enter your material, tool, and machine parameters to get instant feed rate and spindle speed recommendations.',
      tags: ['CNC', 'Calculator', 'Milling', 'Turning'],
      updated: 'Mar 2026',
    },
    {
      id: 'PROJ-003',
      name: 'Speed Programmer',
      cat: 'web_apps',
      status: 'wip',
      url: '/web_apps/speed_programmer.html',
      desc: 'Quick programmer for those who are beginners to manual programming, or really just need g-code fast.',
      tags: ['Web App', 'Tool'],
      updated: 'Mar 2026',
    },
    {
      id: 'PROJ-004',
      name: 'Car Thing',
      cat: 'web_apps',
      status: 'wip',
      url: '/web_apps/car_thing.html',
      desc: 'Low poly car simulator. Nothing really special to it.',
      tags: ['Web App'],
      updated: 'Apr 2026',
    },
  ];
  // ───────────────────────────────────────────────────────────────────────────

  document.getElementById('totalCount').textContent = DATA.length + ' Projects';

  const F = { cat: new Set(), status: new Set() };

  const CHIP_BG = {
    web_apps:  'rgba(200,255,0,0.1)',
    shop_work: 'rgba(232,232,232,0.08)',
    complete:  'rgba(200,255,0,0.1)',
    active:    'rgba(232,232,232,0.08)',
    wip:       'rgba(138,138,154,0.12)',
  };

  function toggle(btn) {
    const g = btn.dataset.g, v = btn.dataset.v;
    if (F[g].has(v)) { F[g].delete(v); btn.classList.remove('on'); }
    else             { F[g].add(v);    btn.classList.add('on'); }
    apply();
  }

  function clearAll() {
    Object.keys(F).forEach(g => F[g].clear());
    document.querySelectorAll('.chip.on').forEach(c => c.classList.remove('on'));
    document.querySelectorAll('.drawer-chip.on').forEach(c => c.classList.remove('on'));
    apply();
  }

  function removeFilter(g, v) {
    F[g].delete(v);
    const btn = document.querySelector(`.chip[data-g="${g}"][data-v="${v}"]`);
    if (btn) btn.classList.remove('on');
    apply();
  }

  function apply() {
    const cards = document.querySelectorAll('.project-card');
    let vis=0, webApps=0, shopWork=0;

    cards.forEach(c => {
      const ok =
        (F.cat.size===0    || F.cat.has(c.dataset.cat)) &&
        (F.status.size===0 || F.status.has(c.dataset.status));
      c.classList.toggle('hide', !ok);
      if (ok) {
        vis++;
        if (c.dataset.cat==='web_apps')  webApps++;
        if (c.dataset.cat==='shop_work') shopWork++;
      }
    });

    document.getElementById('vc').textContent        = vis;
    document.getElementById('sTotal').textContent    = vis;
    document.getElementById('sWebApps').textContent  = webApps;
    document.getElementById('sShopWork').textContent = shopWork;
    document.getElementById('empty').classList.toggle('show', vis===0);

    const bar = document.getElementById('tagBar');
    bar.innerHTML='';
    const all = [
      ...[...F.cat].map(v=>({g:'cat',v})),
      ...[...F.status].map(v=>({g:'status',v})),
    ];
    all.forEach(({g,v})=>{
      const color = CAT_COLOR[v] || STATUS_COLOR[v] || '#fff';
      const label = CAT_LABEL[v] || STATUS_LABEL[v] || v;
      const t = document.createElement('div');
      t.className='atag';
      t.style.background = CHIP_BG[v]||'rgba(255,255,255,0.06)';
      t.style.border = `1px solid ${color}55`;
      t.style.color  = color;
      t.innerHTML = `${label.toUpperCase()} <span class="atag-x" onclick="removeFilter('${g}','${v}')">✕</span>`;
      bar.appendChild(t);
    });
    syncDrawerChips();
  }

  function openDrawer() {
    document.getElementById('filterDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('filterDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }
  function toggleDrawer(btn) {
    const g = btn.dataset.g, v = btn.dataset.v;
    if (F[g].has(v)) { F[g].delete(v); btn.classList.remove('on'); }
    else             { F[g].add(v);    btn.classList.add('on'); }
    const sideChip = document.querySelector(`.chip[data-g="${g}"][data-v="${v}"]`);
    if (sideChip) sideChip.classList.toggle('on', F[g].has(v));
    apply();
  }
  function syncDrawerChips() {
    document.querySelectorAll('.drawer-chip').forEach(btn => {
      btn.classList.toggle('on', F[btn.dataset.g].has(btn.dataset.v));
    });
    const hasAny = Object.values(F).some(s => s.size > 0);
    const ftb = document.getElementById('filterToggleBtn');
    if (ftb) ftb.classList.toggle('has-filters', hasAny);
  }

  (function buildCards(){
    const wrap = document.getElementById('cardsWrap');
    DATA.forEach((p, i) => {
      const catColor    = CAT_COLOR[p.cat]       || '#fff';
      const statusColor = STATUS_COLOR[p.status] || '#8a8a9a';

      const card = document.createElement(p.url ? 'a' : 'div');
      card.className = 'project-card';
      if (p.url) card.href = p.url;
      card.style.animationDelay = `${0.05*i + 0.35}s`;
      card.style.setProperty('--cat-color', catColor);
      card.dataset.cat    = p.cat;
      card.dataset.status = p.status;

      const tagPills = (p.tags||[]).map(t =>
        `<span class="tag-pill" style="color:${catColor};border-color:${catColor}44">${t}</span>`
      ).join('');

      const linkIcon = p.url ? `<span class="card-link-icon">↗</span>` : '';

      card.innerHTML = `
        <div class="card-accent-bar"></div>
        <div class="card-body">
          <div class="card-left">
            <div class="card-name">${p.name}${linkIcon}</div>
            <div class="card-id">${p.id}</div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-tags">${tagPills}</div>
            <div class="card-updated">
              <div class="card-updated-dot"></div>
              Last updated: ${p.updated || '—'}
            </div>
          </div>
          <div class="card-right">
            <span class="cat-badge">${CAT_LABEL[p.cat] || p.cat}</span>
            <div class="status-row">
              <div class="status-dot" style="--status-color:${statusColor}"></div>
              ${STATUS_LABEL[p.status]||p.status}
            </div>
          </div>
        </div>
      `;
      wrap.appendChild(card);
    });
    apply();
  })();
</script>
</body>
</html>
